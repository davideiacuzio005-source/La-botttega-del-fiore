<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Bottega del Fiore</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Jost', sans-serif;
  background:#f7f2eb;
}

/* HEADER */
header {
  text-align:center;
  padding:40px 20px;
}

h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:40px;
}

/* BOTTONI FILTRO */
.filters {
  text-align:center;
  margin-bottom:30px;
}

.filter-btn {
  padding:10px 18px;
  margin:5px;
  border:none;
  background:#ddd;
  cursor:pointer;
  border-radius:20px;
  transition:0.3s;
}

.filter-btn.active,
.filter-btn:hover {
  background:#4a5e3a;
  color:#fff;
}

/* GRIGLIA */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card h3 {
  padding:15px;
  font-family:'Cormorant Garamond', serif;
}

/* CTA */
.cta {
  text-align:center;
  padding:50px 20px;
}

.btn {
  display:inline-block;
  padding:15px 25px;
  background:#2c2520;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
  <h1>La Bottega del Fiore</h1>
  <p>I nostri fiori di stagione</p>
</header>

<!-- FILTRI -->
<div class="filters">
  <button class="filter-btn active" data-filter="tutti">Tutti</button>
  <button class="filter-btn" data-filter="estate">Estivi</button>
  <button class="filter-btn" data-filter="inverno">Invernali</button>
  <button class="filter-btn" data-filter="primavera">Primaverili</button>
  <button class="filter-btn" data-filter="autunno">Autunnali</button>
</div>

<!-- GRIGLIA FIORI -->
<div class="grid">

  <!-- ESTATE -->
  <div class="card" data-cat="estate">
    <img src="https://source.unsplash.com/400x400/?sunflower">
    <h3>Girasole</h3>
  </div>

  <div class="card" data-cat="estate">
    <img src="https://source.unsplash.com/400x400/?lavender">
    <h3>Lavanda</h3>
  </div>

  <!-- INVERNO -->
  <div class="card" data-cat="inverno">
    <img src="https://source.unsplash.com/400x400/?poinsettia">
    <h3>Stella di Natale</h3>
  </div>

  <div class="card" data-cat="inverno">
    <img src="https://source.unsplash.com/400x400/?cyclamen">
    <h3>Ciclamino</h3>
  </div>

  <!-- PRIMAVERA -->
  <div class="card" data-cat="primavera">
    <img src="https://source.unsplash.com/400x400/?tulip">
    <h3>Tulipani</h3>
  </div>

  <div class="card" data-cat="primavera">
    <img src="https://source.unsplash.com/400x400/?daisy">
    <h3>Margherite</h3>
  </div>

  <!-- AUTUNNO -->
  <div class="card" data-cat="autunno">
    <img src="https://source.unsplash.com/400x400/?chrysanthemum">
    <h3>Crisantemi</h3>
  </div>

  <div class="card" data-cat="autunno">
    <img src="https://source.unsplash.com/400x400/?dahlia">
    <h3>Dalia</h3>
  </div>

</div>

<!-- CHIAMACI -->
<div class="cta">
  <a href="tel:0522576309" class="btn">Chiamaci</a>
</div>

<script>
const buttons = document.querySelectorAll(".filter-btn");
const cards = document.querySelectorAll(".card");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const filter = btn.dataset.filter;

    cards.forEach(card => {
      if(filter === "tutti" || card.dataset.cat === filter){
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  });
});
</script>

</body>
</html>
