<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Bottega del Fiore</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

/* COLORI PREMIUM */
:root {
  --cream:#f7f2eb;
  --sage:#7a8c6e;
  --moss:#4a5e3a;
  --blush:#c9877a;
  --ink:#2c2520;
  --gold:#b89b6a;
}

body {
  font-family:'Jost', sans-serif;
  background:var(--cream);
  color:var(--ink);
}

/* ───── NAVBAR ───── */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(247,242,235,0.9);
  backdrop-filter:blur(12px);
  z-index:1000;
  border-bottom:1px solid rgba(184,155,106,0.2);
}

.nav-inner {
  max-width:1200px;
  margin:auto;
  height:70px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 2rem;
}

/* LINK */
.nav-left, .nav-right {
  display:flex;
  gap:2rem;
}

.nav-right {
  justify-content:flex-end;
}

.nav-link {
  font-size:0.7rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  text-decoration:none;
  color:var(--ink);
  position:relative;
}

.nav-link::after {
  content:"";
  position:absolute;
  bottom:-3px;
  left:0;
  width:0;
  height:1px;
  background:var(--blush);
  transition:0.3s;
}

.nav-link:hover::after {
  width:100%;
}

/* LOGO */
.logo {
  text-align:center;
  text-decoration:none;
  color:var(--ink);
}

.logo-name {
  font-family:'Cormorant Garamond', serif;
  font-size:1.4rem;
}

.logo-sub {
  font-size:0.6rem;
  letter-spacing:0.3em;
  color:var(--gold);
}

/* CTA */
.nav-cta {
  padding:0.5rem 1.2rem;
  background:var(--moss);
  color:white;
  text-decoration:none;
  font-size:0.7rem;
}

/* ───── HAMBURGER ───── */
.hamburger {
  display:none;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
  background:none;
  border:none;
}

.hamburger span {
  width:24px;
  height:1px;
  background:var(--ink);
  transition:0.3s;
}

/* animazione X */
.hamburger.open span:nth-child(1){
  transform:translateY(6px) rotate(45deg);
}
.hamburger.open span:nth-child(2){
  opacity:0;
}
.hamburger.open span:nth-child(3){
  transform:translateY(-6px) rotate(-45deg);
}

/* ───── MOBILE MENU ───── */
.mobile-menu {
  position:fixed;
  top:70px;
  width:100%;
  background:var(--cream);
  max-height:0;
  overflow:hidden;
  transition:0.4s;
}

.mobile-menu.open {
  max-height:500px;
  padding:2rem;
}

.mobile-link {
  display:block;
  font-family:'Cormorant Garamond', serif;
  font-size:1.8rem;
  padding:0.5rem 0;
  text-decoration:none;
  color:var(--ink);
  border-bottom:1px solid rgba(0,0,0,0.1);
}

/* ───── HERO ───── */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}

.hero h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(3rem,7vw,6rem);
}

.hero em {
  color:var(--blush);
  font-style:italic;
}

.hero p {
  margin-top:1rem;
  max-width:400px;
  opacity:0.7;
}

/* ───── RESPONSIVE ───── */
@media(max-width:768px){

  .nav-left, .nav-right {
    display:none;
  }

  .hamburger {
    display:flex;
  }

  .nav-inner {
    grid-template-columns:auto 1fr auto;
  }

  .logo {
    justify-self:center;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-inner">

    <div class="nav-left">
      <a href="#" class="nav-link">Negozio</a>
      <a href="#" class="nav-link">Composizioni</a>
      <a href="#" class="nav-link">Piante</a>
    </div>

    <a href="#" class="logo">
      <div class="logo-name">La Bottega del Fiore</div>
      <div class="logo-sub">Florist</div>
    </a>

    <div class="nav-right">
      <a href="#" class="nav-link">Eventi</a>
      <a href="#" class="nav-link">Contatti</a>
      <a href="#" class="nav-cta">Trovaci</a>
    </div>

    <!-- HAMBURGER -->
    <button class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="menu">
  <a href="#" class="mobile-link">Negozio</a>
  <a href="#" class="mobile-link">Composizioni</a>
  <a href="#" class="mobile-link">Piante</a>
  <a href="#" class="mobile-link">Eventi</a>
  <a href="#" class="mobile-link">Contatti</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Fiori che <em>parlano</em></h1>
  <p>Composizioni artigianali e bouquet su misura.</p>
</section>

<script>

const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("open");
  menu.classList.toggle("open");
});

</script>

</body>
</html>
